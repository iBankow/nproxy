server {
    listen 80; # O Railway injeta a porta automaticamente
    server_name _;

    # Encaminha requisições de /api para o serviço interno
    location /api/ {
        proxy_pass napi.railway.internal:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Encaminha o restante para o frontend interno
    location / {
        proxy_pass nfront.railway.internal:80;
        proxy_set_header Host $host;
    }
}
